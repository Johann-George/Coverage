    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);

      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

      .grid-4 {

    // Products data
    const products = [

                Pricing
              </div>
            </div>
            
            {/* Customer Context Card */}
            <div className="context-card">
              <div className="context-avatar">
                {customerContext.name.charAt(0)}
              </div>
              <div className="context-details">
                <div className="context-title">{customerContext.name}</div>
                <div className="context-subtitle">
                  {customerContext.type} · {customerContext.industry} · via {customerContext.broker}
                </div>
              </div>
              <div className="context-badge">✓ KYC Verified</div>
            </div>
            
            {/* Section 1: Product Selection */}
            <div className="form-section">
              <div className="section-header">
                <div className="section-icon" style={{ background: '#eff6ff', color: '#1e40af' }}>📦</div>
                <div>
                  <h3 className="section-title">Select Product</h3>
                  <p className="section-description">Choose the group life product for this quotation</p>
                </div>
              </div>
              
              <div className="grid-2">
                {products.map(product => (
                  <div 
                    key={product.id}
                    className={`product-card ${selectedProduct === product.id ? 'selected' : ''}`}
                    onClick={() => setSelectedProduct(product.id)}
                  >
                    {selectedProduct === product.id && (
                      <div className="check-mark"><CheckIcon /></div>
                    )}
                    <span className={`product-badge badge-${product.badge}`}>
                      {product.badge}
                    </span>
                    <div style={{ fontWeight: '600', fontSize: '16px', marginBottom: '4px', color: '#0f172a' }}>
                      {product.name}
                    </div>
                    <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '4px' }}>
                      {product.code}
                    </div>
                    <div style={{ fontSize: '13px', color: '#64748b', marginBottom: '8px', lineHeight: '1.4' }}>
                      {product.description}
                    </div>
                    <div style={{ fontSize: '12px', color: '#94a3b8' }}>
                      {product.minLives} - {product.maxLives ? product.maxLives.toLocaleString() : '∞'} lives
                    </div>
                    <div className="product-features">
                      {product.features.slice(0, 4).map((f, i) => (
                        <span key={i} className="feature-tag">
                          <CheckIcon size={12} /> {f}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              
              {/* Product Details Panel */}
              {selectedProduct && (
                <div className="product-details-panel">
                  <div className="panel-header">
                    <PackageIcon />
                    <span className="panel-title">{getProduct()?.name} — Included Coverages</span>
                  </div>
                  <div className="coverage-grid">
                    {getProduct()?.coverages.map((coverage, i) => (
                      <div key={i} className="coverage-item">
                        <span className="coverage-check"><CheckIcon size={12} /></span>
                        {coverage}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            
            {/* Section 2: Scheme Classification */}
            <div className="form-section">
              <div className="section-header">
                <div className="section-icon" style={{ background: '#fef3c7', color: '#d97706' }}>⚙️</div>
                <div>
                  <h3 className="section-title">Scheme Classification</h3>
                  <p className="section-description">Define scheme type and contribution structure</p>
                </div>
              </div>
              
              <div className="grid-2" style={{ marginBottom: '20px' }}>
                <div>
                  <label className="form-label">Scheme Type <span className="required">*</span></label>
                  <select 
                    className="form-input" 
                    value={schemeType}
                    onChange={(e) => setSchemeType(e.target.value)}
                  >
                    <option value="">Select Scheme Type</option>
                    <option value="ordinary">Ordinary Life</option>
                    <option value="deposit">Deposit Administration</option>
                    <option value="unit-linked">Unit Linked</option>
                    <option value="hybrid">Hybrid</option>
                  </select>
                </div>
                <div>
                  <label className="form-label">
                    Scheme Size (No. of Employees) <span className="required">*</span>
                  </label>
                  <div className="scheme-size-input">
                    <input 
                      type="text" 
                      className="form-input" 
                      placeholder="e.g. 450"
                      value={schemeSize}
                      onChange={(e) => setSchemeSize(e.target.value.replace(/\D/g, ''))}
                      style={{ 
                        borderColor: schemeSize && !isValidSchemeSize() ? '#ef4444' : undefined 
                      }}
                    />
                    <span className="scheme-size-suffix">employees</span>
                  </div>
                  {schemeSize && !isValidSchemeSize() && (
                    <div style={{ marginTop: '6px', fontSize: '12px', color: '#ef4444' }}>
                      ⚠ {getProduct()?.name} requires {getProduct()?.minLives} - {getProduct()?.maxLives?.toLocaleString() || '∞'} lives
                    </div>
                  )}
                </div>
              </div>
              
              {/* Premium Contribution Type */}
              <div style={{ marginBottom: '8px' }}>
                <label className="form-label">Premium Contribution Type <span className="required">*</span></label>
              </div>
              <div className="grid-3" style={{ marginBottom: '8px' }}>
                <div 
                  className={`contribution-card ${contributionType === 'employer' ? 'selected' : ''}`}
                  onClick={() => { setContributionType('employer'); setEmployerContribution(100); }}
                >
                  <div className="contribution-icon">🏢</div>
                  <div style={{ fontWeight: '600', fontSize: '14px', marginBottom: '2px' }}>Employer Pays Fully</div>
                  <div style={{ fontSize: '12px', color: '#64748b' }}>100% employer funded</div>
                </div>
                
                <div 
                  className={`contribution-card ${contributionType === 'shared' ? 'selected' : ''}`}
                  onClick={() => { setContributionType('shared'); setEmployerContribution(70); }}
                >
                  <div className="contribution-icon">🤝</div>
                  <div style={{ fontWeight: '600', fontSize: '14px', marginBottom: '2px' }}>Shared Contribution</div>
                  <div style={{ fontSize: '12px', color: '#64748b' }}>Split between parties</div>
                </div>
                
                <div 
                  className={`contribution-card ${contributionType === 'employee' ? 'selected' : ''}`}
                  onClick={() => { setContributionType('employee'); setEmployerContribution(0); }}
                >
                  <div className="contribution-icon">👤</div>
                  <div style={{ fontWeight: '600', fontSize: '14px', marginBottom: '2px' }}>Employee Pays Fully</div>
                  <div style={{ fontSize: '12px', color: '#64748b' }}>Voluntary scheme</div>
                </div>
              </div>
              
              {/* Contribution Slider (for shared) */}
              {contributionType === 'shared' && (
                <div className="slider-container">
                  <div style={{ textAlign: 'center', marginBottom: '8px', fontWeight: '500', color: '#64748b', fontSize: '13px' }}>
                    Adjust contribution split
                  </div>
                  <div 
                    className="slider-track"
                    onClick={handleSliderChange}
                    style={{ cursor: 'pointer' }}
                  >
                    <div 
                      className="slider-fill" 
                      style={{ width: `${employerContribution}%` }}
                    />
                    <div 
                      className="slider-thumb"
                      style={{ left: `${employerContribution}%` }}
                    />
                  </div>
                  <div className="slider-labels">
                    <span>Employee 100%</span>
                    <span>50/50</span>
                    <span>Employer 100%</span>
                  </div>
                  <div className="contribution-summary">
                    <div className="contribution-item">
                      <div className="contribution-value">{employerContribution}%</div>
                      <div className="contribution-label">Employer Contribution</div>
                    </div>
                    <div className="contribution-item">
                      <div className="contribution-value">{100 - employerContribution}%</div>
                      <div className="contribution-label">Employee Contribution</div>
                    </div>
                  </div>
                </div>
              )}
              
              {contributionType === 'employee' && (
                <div className="warning-card" style={{ marginTop: '12px' }}>
                  <AlertIcon />
                  <span>
                    <strong>Voluntary Scheme:</strong> Employee-funded schemes may have lower participation rates. 
                    Consider a minimum participation requirement (typically 75%) for underwriting.
                  </span>
                </div>
              )}
            </div>
            
            {/* Section 3: Quote Configuration */}
            <div className="form-section">
              <div className="section-header">
                <div className="section-icon" style={{ background: '#f0fdf4', color: '#16a34a' }}>📋</div>
                <div>
                  <h3 className="section-title">Quote Configuration</h3>
                  <p className="section-description">Set quote validity and reference details</p>
                </div>
              </div>
              
              <div className="grid-2">
                <div>
                  <label className="form-label">Quote Validity <span className="required">*</span></label>
                  <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                    {validityOptions.map(days => (
                      <div
                        key={days}
                        className={`validity-option ${quoteValidity === days ? 'selected' : ''}`}
                        onClick={() => setQuoteValidity(days)}
                        style={{ flex: '1', minWidth: '60px' }}
                      >
                        {days} days
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="form-label">Quote Reference <span className="auto-badge">AUTO-GENERATED</span></label>
                  <input 
                    type="text" 
                    className="form-input" 
                    value="QT-2025-SAF-00847" 
                    disabled 
                    style={{ fontFamily: 'monospace', letterSpacing: '0.5px' }}
                  />
                  <div style={{ marginTop: '6px', fontSize: '12px', color: '#64748b' }}>
                    Reference will be assigned upon draft save
                  </div>
                </div>
              </div>
              
              <div className="info-card" style={{ marginTop: '16px' }}>
                <InfoIcon />
                <span>
                  Quote validity starts from the date of dispatch to the customer. 
                  Quotes can be extended before expiry with underwriting approval.
                </span>
              </div>
            </div>
            
            {/* Summary Card */}
            <div className="form-section" style={{ background: 'linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%)', border: '1px solid #bae6fd' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                <div style={{ fontSize: '24px' }}>📊</div>
                <div>
                  <h3 style={{ margin: 0, fontSize: '16px', fontWeight: '600' }}>Selection Summary</h3>
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px' }}>
                <div>
                  <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '4px' }}>Product</div>
                  <div style={{ fontWeight: '600', color: '#0f172a' }}>{getProduct()?.name}</div>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '4px' }}>Scheme Size</div>
                  <div style={{ fontWeight: '600', color: '#0f172a' }}>{schemeSize || '—'} employees</div>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '4px' }}>Contribution</div>
                  <div style={{ fontWeight: '600', color: '#0f172a' }}>
                    {contributionType === 'employer' && 'Employer 100%'}
                    {contributionType === 'employee' && 'Employee 100%'}
                    {contributionType === 'shared' && `${employerContribution}% / ${100 - employerContribution}%`}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '4px' }}>Validity</div>
                  <div style={{ fontWeight: '600', color: '#0f172a' }}>{quoteValidity} days</div>
                </div>
              </div>
            </div>
            
            {/* Action Buttons */}
            <div className="action-bar">
              <button className="btn-outline" type="button">
                <ChevronLeft /> Back to Customer
              </button>
              <div className="action-bar-right">
                <button className="btn-secondary" type="button">
                  💾 Save Draft
                </button>
                <button 
                  className="btn-primary" 
                  type="button"
                  disabled={!schemeType || !schemeSize || !isValidSchemeSize()}
                >
                  Continue to Scheme Details
                  <ChevronRight />
                </button>
              </div>
            </div>
            
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
